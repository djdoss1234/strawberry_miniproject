robot_cfg:
  kinematics:
    use_usd_kinematics: False
    urdf_path: "e0509_gripper.urdf"
    asset_root_path: ""
    base_link: "base_link"
    # Measured physical grasp center: link_6/flange + TOOL Z 0.260m.
    ee_link: "grasp_tcp_link"
    collision_link_names:
      [
        "base_link",
        "link_1",
        "link_2",
        "link_3",
        "link_4",
        "link_5",
        "link_6",
        "gripper_rh_p12_rn_base",
        "grasp_tcp_link",
        "attached_object",
      ]
    collision_spheres: "e0509_spheres.yml"
    collision_sphere_buffer: 0.005
    extra_collision_spheres: {"attached_object": 4}
    use_global_cumul: True
    self_collision_ignore:
      {
        "base_link": ["link_1", "link_2"],
        "link_1": ["link_2", "link_3"],
        "link_2": ["link_3", "link_4"],
        "link_3": ["link_4", "link_5"],
        "link_4": ["link_5", "link_6"],
        "link_5": ["link_6", "gripper_rh_p12_rn_base", "grasp_tcp_link"],
        "link_6": ["gripper_rh_p12_rn_base", "grasp_tcp_link", "attached_object"],
        "gripper_rh_p12_rn_base": ["grasp_tcp_link", "attached_object"],
        "grasp_tcp_link": ["attached_object"],
      }
    self_collision_buffer:
      {
        "base_link": 0.08,
        "link_1": 0.05,
        "link_2": 0.0,
        "link_3": 0.0,
        "link_4": 0.0,
        "link_5": 0.0,
        "link_6": 0.0,
        "gripper_rh_p12_rn_base": 0.02,
        "grasp_tcp_link": 0.0,
        "attached_object": 0.0,
      }
    lock_joints: {}
    extra_links:
      {
        "attached_object":
          {
            "parent_link_name": "grasp_tcp_link",
            "link_name": "attached_object",
            "fixed_transform": [0, 0, 0, 1, 0, 0, 0],
            "joint_type": "FIXED",
            "joint_name": "attach_joint",
          },
      }
    cspace:
      joint_names:
        [
          "joint_1",
          "joint_2",
          "joint_3",
          "joint_4",
          "joint_5",
          "joint_6",
        ]
      retract_config: [0.0, 0.0, 1.5708, 0.0, 1.5708, 0.0]
      null_space_weight: [1, 1, 1, 1, 1, 1]
      cspace_distance_weight: [1, 1, 1, 1, 1, 1]
      max_acceleration: 10.0
      max_jerk: 500.0
